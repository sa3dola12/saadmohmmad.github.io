<!DOCTYPE html>
<html lang="en">

<head>
    <title>Add Courses</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Add Courses</h1>
        <p>Use the form below to add new courses to your schedule.</p>
    </header>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="My Courses.html">My Courses</a></li>
            <li><a href="Add Courses.html">Add Courses</a></li>
            <li><a href="Contact US.html">Contact Us</a></li>
        </ul>
    </nav>
    <main>
        <section>
            <h2>Add a New Course</h2>
            <form action="#" method="post">
                <label for="courseName">Course Name:</label><br>
                <input type="text" id="courseName" name="courseName" required><br><br>

                <label for="instructor">Doctor Name:</label><br>
                <input type="text" id="instructor" name="instructor" required><br><br>

                <label for="creditHours">Credit Hours:</label><br>
                <input type="number" id="creditHours" name="creditHours" min="1" max="5" required><br><br>
                <label for="notes">Notes:</label><br>
                <textarea id="notes" name="notes" rows="4" cols="50"></textarea><br><br>

                <button type="submit">Add Course</button>
            </form>
        </section>
    </main>
    <footer>

    </footer>

</html>
