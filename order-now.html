     <h1>Order Now!</h1>
     <form class="order form">
            <label for="firstName">First Name:</label>
            <input type="text" id="firstName" name="firstName" required placeholder="Enter your first name">
        <br>
            <label for="lastName">Last Name:</label>
            <input type="text" id="lastName" name="lastName" required placeholder="Enter your last name">
        <br>
            <label for="phone">Phone Number:</label>
            <input type="tel" id="phone" name="phone" required placeholder="Enter your phone number">
        <br>
            <label for="yourOrder">Your Order:</label>
            <input type="text" id="yourOrder" name="yourOrder" required placeholder="Enter your orderl">
        <br>
            <label for="address">Delivery Address:</label>
            <textarea id="address" name="address" required placeholder="Enter your delivery address in detail"></textarea>
        <br>
            <label for="specialNotes">Special Notes:</label>
            <textarea id="specialNotes" name="specialNotes" placeholder="Enter any special notes to your order"></textarea>
        <br>
            <div class="form-footer">
                <button type="submit">PLACE ORDER</button><br>
            </div>
     </form>
